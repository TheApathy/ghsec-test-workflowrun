name: Vector - Merge Group Trigger
on:
  merge_group:
    types: [checks_requested]

jobs:
  test-merge-group:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log merge group info
        run: |
          echo "=== MERGE GROUP TRIGGER ==="
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Head ref: ${{ github.event.merge_group.head_ref }}"
          echo "Base ref: ${{ github.event.merge_group.base_ref }}"
          echo "Secret present: ${{ secrets.FAKE_SECRET != '' && 'YES' || 'NO' }}"
          echo "==========================="
