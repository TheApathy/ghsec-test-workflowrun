name: Vector - Artifact Collision
on:
  pull_request:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "ATTACKER_ARTIFACT_DATA" > build-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          overwrite: true
